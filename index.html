<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Khoj - Login & Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo">🏠</div>
                <h2 class="app-name">Room Khoj</h2>
            </div>

            <!-- Tab Navigation -->
            <div class="tab-navigation">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="signup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="form-container active">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input 
                        type="email" 
                        id="login-email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input 
                        type="password" 
                        id="login-password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="btn-submit">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" class="form-container">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input 
                        type="text" 
                        id="signup-name" 
                        name="name" 
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input 
                        type="email" 
                        id="signup-email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input 
                        type="password" 
                        id="signup-password" 
                        name="password" 
                        placeholder="Enter password (min 6 characters)"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <input 
                        type="password" 
                        id="signup-confirm" 
                        name="confirm" 
                        placeholder="Confirm your password"
                        required
                    >
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div id="message" class="message"></div>

            <!-- Demo Credentials -->
            <div class="demo-info">
                <p><strong>Demo Credentials:</strong></p>
                <p>Email: <code>admin@roomkhoj.com</code></p>
                <p>Password: <code>admin</code></p>
            </div>

            <div class="footer">
                <p><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <!-- Dashboard (Hidden initially) -->
    <div id="dashboard" class="dashboard hidden">
        <nav class="navbar">
            <div class="navbar-brand">🏠 Room Khoj</div>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </nav>

        <div class="dashboard-content">
            <h1>Welcome, <span id="userName"></span>!</h1>

            <div class="dashboard-grid">
                <!-- Search Room Section -->
                <div class="card">
                    <h3>🔍 Search Room</h3>
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="roomSearch" 
                            placeholder="Enter room name to search..."
                            class="search-input"
                        >
                        <button id="searchBtn" class="btn-primary">Search</button>
                    </div>
                    <div id="searchResults" class="results"></div>
                </div>

                <!-- Create Room Section -->
                <div class="card">
                    <h3>➕ Create Room</h3>
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="roomName" 
                            placeholder="Room name"
                            class="search-input"
                        >
                        <input 
                            type="number" 
                            id="roomBudget" 
                            placeholder="Budget (e.g., 15000)"
                            class="search-input"
                        >
                        <button id="createBtn" class="btn-primary">Create</button>
                    </div>
                </div>
            </div>

            <!-- My Rooms Section -->
            <div class="card full-width">
                <h3>📍 My Rooms</h3>
                <div id="myRooms" class="rooms-list"></div>
            </div>

            <!-- All Rooms Section -->
            <div class="card full-width">
                <h3>🏘️ All Available Rooms</h3>
                <div id="allRooms" class="rooms-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
